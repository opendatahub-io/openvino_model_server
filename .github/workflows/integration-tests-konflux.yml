name: Integration Tests - Konflux

on:
  # Trigger when a PR build check_run event is posted by Konflux
  check_run:
    types: [completed]
  # Allow manual trigger with custom image tag
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (e.g., odh-pr-123)'
        required: true
        type: string
      source_ref:
        description: 'Git ref to checkout for tests (branch, tag, or commit SHA)'
        required: true
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  # Extract image information from the trigger event
  setup:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    # Only run for workflow_dispatch or relevant check_run events
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'check_run' &&
        github.event.check_run.app.slug == 'red-hat-konflux' &&
        github.event.check_run.conclusion == 'success' &&
        github.event.check_run.name == 'Red Hat Konflux / openvino-model-server-on-pull-request'
      )
    outputs:
      image_tag: ${{ steps.set_image_tag.outputs.image_tag }}
      source_ref: ${{ steps.set_source_ref.outputs.source_ref }}
    steps:
      - name: Set image tag
        id: set_image_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="odh-pr-${{ github.event.check_run.head_sha }}"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"
      - name: Set source ref
        id: set_source_ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.event.inputs.source_ref }}"
          else
            REF="${{ github.event.check_run.head_sha }}"
          fi
          echo "source_ref=${REF}" >> $GITHUB_OUTPUT
          echo "Source ref: ${REF}"
      - name: Post setup failure statuses
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for context in "File Integrity Test" "Python Clients Test" "Latency Performance Test" "Throughput Performance Test" "Functional Tests"; do
            gh api repos/${{ github.repository }}/statuses/${{ github.event.check_run.head_sha }} \
              -f state=failure \
              -f context="$context" \
              -f description="Setup failed - cannot run tests" \
              -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          done

  # Pull the image
  pull-image:
    name: Pull Image from Quay.io
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Pull image
        run: |
          FULL_IMAGE="quay.io/opendatahub/openvino_model_server:${{ needs.setup.outputs.image_tag }}"
          echo "Pulling image: ${FULL_IMAGE}"
          docker pull ${FULL_IMAGE}
          docker tag ${FULL_IMAGE} openvino/model_server:latest
      - name: Save Docker image
        run: |
          docker save openvino/model_server:latest | gzip > model-server-image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-server-image
          path: model-server-image.tar.gz
          retention-days: 1
      - name: Post image pull failure statuses
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FULL_IMAGE="quay.io/opendatahub/openvino_model_server:${{ needs.setup.outputs.image_tag }}"
          for context in "File Integrity Test" "Python Clients Test" "Latency Performance Test" "Throughput Performance Test" "Functional Tests"; do
            gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
              -f state=failure \
              -f context="$context" \
              -f description="Failed to pull image: ${FULL_IMAGE}" \
              -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          done

  # File integrity test
  file-integrity:
    name: File Integrity Test
    runs-on: ubuntu-latest
    needs: [setup, pull-image]
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="File Integrity Test" \
            -f description="Running file integrity tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: model-server-image
      - name: Load Docker image
        run: |
          docker load < model-server-image.tar.gz
      - name: Run file integrity test
        run: |
          make run_lib_files_test
      - name: Post success status to commit
        if: github.event_name == 'check_run' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="File Integrity Test" \
            -f description="File integrity tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="File Integrity Test" \
            -f description="File integrity tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Python clients test
  clients-test:
    name: Python Clients Test
    runs-on: ubuntu-latest
    needs: [setup, pull-image]
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="Python Clients Test" \
            -f description="Running Python client tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: model-server-image
      - name: Load Docker image
        run: |
          docker load < model-server-image.tar.gz
      - name: Run Python clients test
        run: |
          make test_python_clients
      - name: Post success status to commit
        if: github.event_name == 'check_run' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="Python Clients Test" \
            -f description="Python client tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="Python Clients Test" \
            -f description="Python client tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Latency performance test
  latency-test:
    name: Latency Performance Test
    runs-on: ubuntu-latest
    needs: [setup, pull-image]
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="Latency Performance Test" \
            -f description="Running latency tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: model-server-image
      - name: Load Docker image
        run: |
          docker load < model-server-image.tar.gz
      - name: Run latency test
        run: |
          make test_perf
      - name: Post success status to commit
        if: github.event_name == 'check_run' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="Latency Performance Test" \
            -f description="Latency tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="Latency Performance Test" \
            -f description="Latency tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Throughput performance test
  throughput-test:
    name: Throughput Performance Test
    runs-on: ubuntu-latest
    needs: [setup, pull-image]
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="Throughput Performance Test" \
            -f description="Running throughput tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: model-server-image
      - name: Load Docker image
        run: |
          docker load < model-server-image.tar.gz
      - name: Run throughput test
        run: |
          make test_throughput
      - name: Post success status to commit
        if: github.event_name == 'check_run' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="Throughput Performance Test" \
            -f description="Throughput tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="Throughput Performance Test" \
            -f description="Throughput tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Functional tests
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: [setup, pull-image]
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'check_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="Functional Tests" \
            -f description="Running functional tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: model-server-image
      - name: Load Docker image
        run: |
          docker load < model-server-image.tar.gz
      - name: Run functional tests
        env:
          IMAGE: openvino/model_server:latest
        run: |
          make test_functional
      - name: Post success status to commit
        if: github.event_name == 'check_run' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="Functional Tests" \
            -f description="Functional tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'check_run' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="Functional Tests" \
            -f description="Functional tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"