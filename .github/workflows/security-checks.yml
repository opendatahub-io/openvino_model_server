name: Security Checks

on:
  pull_request:
    branches:
      - 'stable*'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sdl-security-checks:
    name: SDL Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run SDL security checks
        id: run-sdl-check
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: make sdl-check
      - name: PR comment on failure
        if: steps.run-sdl-check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "⚠️ **SDL Security Checks Failed** - Review recommended but not blocking merge."
